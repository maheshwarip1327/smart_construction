<!DOCTYPE html>
<html>
<head>
<title>Material Inventory</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #eef2f3, #ffffff);
}

.container {
    max-width: 900px;
}

.card {
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

h2 {
    font-weight: bold;
}

.btn:hover {
    transform: scale(1.05);
}

.material-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.badge {
    font-size: 15px;
}
</style>

</head>

<body>

<div class="container mt-5">

    <!-- Title -->
    <h2 class="text-center mb-4">📦 Material Inventory</h2>

    <!-- Home Button -->
    <div class="text-center mb-3">
        <a href="/" class="btn btn-dark">Home</a>
    </div>

    <!-- Form -->
    <div class="card shadow p-4 mb-4">
        <form method="post">
            {% csrf_token %}

            <input name="name" placeholder="Material Name" class="form-control mb-3" required>

            <input name="quantity" type="number" placeholder="Quantity" class="form-control mb-3" required>

            <button class="btn btn-warning w-100">➕ Add Material</button>
        </form>
    </div>

    <!-- Total Materials -->
    <div class="alert alert-info text-center">
        <strong>Total Materials:</strong> {{ data|length }}
    </div>

    <!-- Material List -->
    <h4 class="mb-3">📋 Available Materials</h4>

    {% for i in data %}
    <div class="card p-3 mb-2 shadow-sm material-item">
        <span><strong>{{ i.name }}</strong></span>
        <span class="badge bg-primary">Qty: {{ i.quantity }}</span>
    </div>
    {% empty %}
    <div class="alert alert-warning text-center">
        No materials added yet!
    </div>
    {% endfor %}

</div>

</body>
</html>
