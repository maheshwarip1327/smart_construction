<!DOCTYPE html>
<html>
<head>
<title>Budget Tracking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    font-family: Arial, sans-serif;
}

/* Card style */
.card {
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

/* Title */
h2 {
    font-weight: bold;
    color: #2c3e50;
}

/* Button */
.btn-custom {
    background: linear-gradient(to right, #ff416c, #ff4b2b);
    color: white;
    border: none;
    font-weight: bold;
}

.btn-custom:hover {
    transform: scale(1.05);
}

/* Input */
input {
    border-radius: 10px !important;
}
</style>

</head>

<body>

<div class="container mt-5">

    <!-- Title -->
    <h2 class="text-center mb-4">💰 Budget Tracking</h2>

    <!-- Home Button -->
    <div class="text-center mb-4">
        <a href="/" class="btn btn-dark">🏠 Home</a>
    </div>

    <!-- Form -->
    <div class="card shadow p-4 mb-4">

        <form method="post">
            {% csrf_token %}

            <input name="amount" placeholder="Enter Amount (₹)" class="form-control mb-3">

            <input name="desc" placeholder="Enter Description" class="form-control mb-3">

            <button class="btn btn-custom w-100">➕ Add Expense</button>
        </form>

    </div>

    <!-- Total -->
    <div class="card p-3 mb-4 text-center shadow">
        <h4>Total Budget: ₹ {{ total }}</h4>
    </div>

    <!-- List -->
    <h4 class="mb-3">📊 Expense List</h4>

    {% for i in data %}
    <div class="card p-3 mb-2 shadow-sm">
        <strong>₹ {{ i.amount }}</strong> 
        <span class="text-muted"> - {{ i.desc }}</span>
    </div>
    {% empty %}
    <p>No expenses added yet</p>
    {% endfor %}

</div>

</body>
</html>
