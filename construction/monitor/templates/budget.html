<!DOCTYPE html>
<html>
<head>
<title>Budget Tracking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
}

.container {
    max-width: 800px;
}

.card {
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

.btn-custom {
    background: linear-gradient(to right, #ff416c, #ff4b2b);
    color: white;
    border: none;
}

.btn-custom:hover {
    transform: scale(1.05);
}

.total-box {
    background: #2c3e50;
    color: white;
    border-radius: 15px;
}
</style>

</head>

<body>

<div class="container mt-5">

    <!-- TITLE -->
    <h2 class="text-center mb-4">💰 Budget Tracking</h2>

    <!-- HOME -->
    <div class="text-center mb-3">
        <a href="/" class="btn btn-dark">🏠 Home</a>
    </div>

    <!-- ADD EXPENSE -->
    <div class="card p-4 mb-4 shadow">
        <form method="post">
            {% csrf_token %}

            <input name="amount" type="number" class="form-control mb-3"
                   placeholder="Enter Amount (₹)" required>

            <input name="desc" class="form-control mb-3"
                   placeholder="Enter Description (e.g. Cement)" required>

            <button class="btn btn-custom w-100">➕ Add Expense</button>
        </form>
    </div>

    <!-- TOTAL + RESET -->
    <div class="card p-3 mb-4 text-center shadow total-box">
        <h4>Total: ₹ {{ total }}</h4>

        <!-- RESET BUTTON -->
        <a href="/reset-budget/" class="btn btn-warning mt-2"
           onclick="return confirm('Reset total amount?')">
            🔄 Reset Total
        </a>
    </div>

    <!-- LIST -->
    <h4 class="mb-3">📊 Expense List</h4>

    {% for i in data %}
    <div class="card p-3 mb-3 shadow-sm">

        <div class="d-flex justify-content-between align-items-center">

            <div>
                <strong>₹ {{ i.amount }}</strong><br>
                <small class="text-muted">{{ i.desc }}</small>
            </div>

            <!-- DELETE BUTTON -->
            <a href="/delete-budget/{{ i.id }}/" class="btn btn-danger btn-sm">
                🗑
            </a>

        </div>

    </div>
    {% empty %}
    <div class="alert alert-warning text-center">
        No expenses added yet!
    </div>
    {% endfor %}

</div>

</body>
</html>
