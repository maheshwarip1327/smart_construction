<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #dfe9f3, #ffffff);
    font-family: Arial, sans-serif;
}

.card {
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.07);
}

h2 {
    font-weight: bold;
}

/* Icons */
.icon {
    font-size: 30px;
}
</style>

</head>

<body>

<div class="container mt-5 text-center">

    <h2 class="mb-5">📊 Dashboard Overview</h2>

    <a href="/" class="btn btn-dark mb-4">🏠 Home</a>

    <div class="row g-4">

        <!-- Projects -->
        <div class="col-md-3">
            <div class="card shadow-lg p-4 text-white" style="background: linear-gradient(45deg, #4facfe, #00f2fe);">
                <div class="icon">🏗️</div>
                <h4>Projects</h4>
                <h1>{{ projects }}</h1>
            </div>
        </div>

        <!-- Workers -->
        <div class="col-md-3">
            <div class="card shadow-lg p-4 text-white" style="background: linear-gradient(45deg, #43e97b, #38f9d7);">
                <div class="icon">👷</div>
                <h4>Workers</h4>
                <h1>{{ workers }}</h1>
            </div>
        </div>

        <!-- Materials -->
        <div class="col-md-3">
            <div class="card shadow-lg p-4 text-dark" style="background: linear-gradient(45deg, #f7971e, #ffd200);">
                <div class="icon">🧱</div>
                <h4>Materials</h4>
                <h1>{{ materials }}</h1>
            </div>
        </div>

        <!-- Budget -->
        <div class="col-md-3">
            <div class="card shadow-lg p-4 text-white" style="background: linear-gradient(45deg, #ff416c, #ff4b2b);">
                <div class="icon">💰</div>
                <h4>Budget</h4>
                <h1>{{ budgets }}</h1>
            </div>
        </div>

    </div>

</div>

</body>
</html>
