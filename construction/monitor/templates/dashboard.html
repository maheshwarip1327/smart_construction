<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #dfe9f3, #ffffff);
    font-family: 'Poppins', sans-serif;
}

.container {
    max-width: 1100px;
}

.card {
    border-radius: 20px;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-8px);
}

h2 {
    font-weight: bold;
    letter-spacing: 1px;
}

/* Icons */
.icon {
    font-size: 35px;
    margin-bottom: 10px;
}

/* Card text */
.card h1 {
    font-size: 40px;
    font-weight: bold;
}

/* Button */
.btn-home {
    border-radius: 25px;
    padding: 8px 20px;
}

/* Section spacing */
.row {
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="container mt-5 text-center">

    <!-- TITLE -->
    <h2 class="mb-4">📊 Dashboard Overview</h2>

    <!-- HOME BUTTON -->
    <a href="/" class="btn btn-dark btn-home mb-4">🏠 Home</a>

    <!-- CARDS -->
    <div class="row g-4">

        <!-- Projects -->
        <div class="col-md-3">
            <div class="card shadow-lg p-4 text-white"
                 style="background: linear-gradient(45deg, #4facfe, #00f2fe);">
                <div class="icon">🏗️</div>
                <h5>Projects</h5>
                <h1>{{ projects }}</h1>
                <a href="/project/" class="btn btn-light btn-sm mt-2">View</a>
            </div>
        </div>

        <!-- Workers -->
        <div class="col-md-3">
            <div class="card shadow-lg p-4 text-white"
                 style="background: linear-gradient(45deg, #43e97b, #38f9d7);">
                <div class="icon">👷</div>
                <h5>Workers</h5>
                <h1>{{ workers }}</h1>
                <a href="/worker/" class="btn btn-light btn-sm mt-2">View</a>
            </div>
        </div>

        <!-- Materials -->
        <div class="col-md-3">
            <div class="card shadow-lg p-4 text-dark"
                 style="background: linear-gradient(45deg, #f7971e, #ffd200);">
                <div class="icon">🧱</div>
                <h5>Materials</h5>
                <h1>{{ materials }}</h1>
                <a href="/material/" class="btn btn-dark btn-sm mt-2">View</a>
            </div>
        </div>

        <!-- Budget -->
        <div class="col-md-3">
            <div class="card shadow-lg p-4 text-white"
                 style="background: linear-gradient(45deg, #ff416c, #ff4b2b);">
                <div class="icon">💰</div>
                <h5>Budget</h5>
                <h1>{{ budgets }}</h1>
                <a href="/budget/" class="btn btn-light btn-sm mt-2">View</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
