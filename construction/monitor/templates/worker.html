<!DOCTYPE html>
<html>
<head>
<title>Worker Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #eef2f3, #ffffff);
}

.container {
    max-width: 800px;
}

.card {
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

h2 {
    font-weight: bold;
}

.btn:hover {
    transform: scale(1.05);
}

.worker-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.task-badge {
    background: #28a745;
    color: white;
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 13px;
}
</style>

</head>

<body>

<div class="container mt-5">

    <!-- TITLE -->
    <h2 class="text-center mb-4">👷 Worker Management</h2>

    <!-- NAVIGATION -->
    <div class="text-center mb-3">
        <a href="/" class="btn btn-dark">🏠 Home</a>
        <a href="/dashboard/" class="btn btn-secondary">📊 Dashboard</a>
    </div>

    <!-- ADD WORKER -->
    <div class="card shadow p-4 mb-4">
        <form method="post">
            {% csrf_token %}

            <input name="name"
                   placeholder="Worker Name"
                   class="form-control mb-3"
                   required>

            <input name="task"
                   placeholder="Assigned Task"
                   class="form-control mb-3"
                   required>

            <button class="btn btn-success w-100">
                ➕ Add Worker
            </button>
        </form>
    </div>

    <!-- TOTAL -->
    <div class="alert alert-info text-center">
        <strong>Total Workers:</strong> {{ data|length }}
    </div>

    <!-- LIST -->
    <h4 class="mb-3">📋 Worker List</h4>

    {% for i in data %}
    <div class="card p-3 mb-3 shadow-sm worker-box">

        <!-- LEFT -->
        <div>
            <strong>{{ i.name }}</strong><br>
            <span class="task-badge">{{ i.task }}</span>
        </div>

        <!-- RIGHT -->
        <form action="/delete-worker/{{ i.id }}/" method="post">
            {% csrf_token %}
            <button class="btn btn-danger btn-sm">🗑</button>
        </form>

    </div>

    {% empty %}
    <div class="alert alert-warning text-center">
        No workers added yet!
    </div>
    {% endfor %}

</div>

</body>
</html>
